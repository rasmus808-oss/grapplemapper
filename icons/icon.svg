<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#343230"/>
  <!-- Flowchart logo scaled up -->
  <!-- Top node -->
  <rect x="176" y="80" width="160" height="90" rx="45" fill="#8b5cf6"/>
  <!-- Bottom left node -->
  <rect x="60" y="330" width="150" height="90" rx="45" fill="#c4b5f8"/>
  <!-- Bottom right node -->
  <rect x="302" y="330" width="150" height="90" rx="45" fill="#c4b5f8"/>
  <!-- Line top to bottom-left -->
  <line x1="210" y1="170" x2="150" y2="330" stroke="#8b5cf6" stroke-width="18" stroke-linecap="round"/>
  <!-- Line top to bottom-right -->
  <line x1="302" y1="170" x2="362" y2="330" stroke="#8b5cf6" stroke-width="18" stroke-linecap="round"/>
</svg>